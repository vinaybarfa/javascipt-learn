<body class="" style="background-color: #212121; color: #e2e2e2;">
    <div class="parent">
        <div class="day">Mounday</div>
        <div class="day">Tuesday</div>
        <div class="day">Wednesday</div>
        <div class="day">Thursday</div>
    </div>
</body>
<script>
    // Here we are going to use the parent method
    const parent = document.querySelector(".parent");
    console.log(parent);
    // console.log(parent.children[3].innerHTML);
    for (let i = 0; i < parent.children.length; i++) {
        const element = parent.children[i].innerHTML;
        console.log(element);
    }

    parent.children[1].style.color = "orange";
    console.log(parent.firstElementChild);
    console.log(parent.lastElementChild);
    

    const dayOne = document.querySelector(".day");
    console.log(dayOne);
    console.log(dayOne.parentElement);      // it will return the parent of that element
    console.log(dayOne.nextElementSibling);     // it will return the sibling(bhai) of that element
    

    console.log("NODES : ", parent.childNodes);
    

const div = document.createElement("div");
